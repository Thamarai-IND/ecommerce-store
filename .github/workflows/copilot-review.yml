name: Copilot Code Review

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run unit tests and collect coverage
        run: npm run test -- --coverage

      - name: Check coverage threshold
        id: coverage
        run: |
          COVERAGE=$(npx nyc report --reporter=text-summary | grep 'Statements' | awk '{print $4}' | sed 's/%//')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Build Angular frontend
        run: npm run build -- --configuration production

      - name: Run accessibility checks (example)
        run: echo "Accessibility checks would run here"

      - name: Run vulnerability scan
        run: npm audit --audit-level=high

      - name: Create Issue if coverage below 80%
        if: steps.coverage.outputs.coverage < 80
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Code Review Issue - Coverage Below Threshold',
              body: 'Unit test coverage is below 80%. Please add more tests.\n\nCoverage: ' + process.env.coverage + '%',
              assignees: ['Thamaraiselvan']
            })

      - name: Create PR comment if all checks pass
        if: steps.coverage.outputs.coverage >= 80
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Code Review Passed - Ready for Merge. All checks passed and coverage is above 80%.'
            })
