name: Copilot Code Review (Frontend Only)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend-review:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # - name: Install dependencies
      #   run: npm ci

      - name: Prettier check
        run: npx prettier --check "src/**/*" || true

      - name: Build Angular frontend
        run: npm run build -- --configuration production

      - name: Run unit tests with coverage
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Collect coverage
        id: coverage
        run: |
          COVERAGE=0
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')).total.statements.pct; console.log(Math.round(p));")
          fi
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Accessibility checks (placeholder)
        run: echo "Add axe-core or pa11y checks here"

      - name: Vulnerability scan
        run: npm audit --audit-level=high || echo "npm audit found issues (non-fatal)"

      - name: Create Issue if coverage below 80%
        if: ${{ steps.coverage.outputs.coverage && steps.coverage.outputs.coverage < '80' }}
        uses: actions/github-script@v7
        with:
          script: |
            const cov = parseInt(process.env.COVERAGE || steps.coverage.outputs.coverage || '0', 10);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Code Review Issue - Coverage Below Threshold`,
              body: `Unit test coverage is below 80%. Please add more tests.\n\nCoverage: ${cov}%`,
              assignees: ['Thamarai-IND']
            })

      - name: Create PR comment if all checks pass
        if: ${{ github.event_name == 'pull_request' && steps.coverage.outputs.coverage && steps.coverage.outputs.coverage >= '80' }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Code Review Passed - Ready for Merge. All frontend checks passed and coverage is at or above 80%.'
            })
