name: Copilot Code Review

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 18 is supported for this Angular 20 project; change if you prefer 20
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        # Project has Prettier config; run a check instead of a missing `lint` script
        run: npx prettier --check "src/**/*" || true

      - name: Build Angular frontend
        run: npm run build -- --configuration production

      - name: Run unit tests with coverage
        # Use headless mode and disable watch to run in CI
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Collect coverage (from Karma coverage-summary)
        id: coverage
        run: |
          # Default to 0 if no summary produced
          COVERAGE=0
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')).total.statements.pct; console.log(Math.round(p));")
          fi
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Run accessibility checks (placeholder)
        run: echo "Add repository-specific a11y checks (axe or storybook a11y) if desired"

      - name: Run vulnerability scan (npm audit quick check)
        run: npm audit --audit-level=high || echo "npm audit found issues (non-fatal here)"

      - name: Create Issue if coverage below 80%
        if: ${{ steps.coverage.outputs.coverage && steps.coverage.outputs.coverage < '80' }}
        uses: actions/github-script@v7
        with:
          script: |
            const cov = parseInt(process.env.COVERAGE || steps.coverage.outputs.coverage || '0', 10);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Code Review Issue - Coverage Below Threshold`,
              body: `Unit test coverage is below 80%. Please add more tests.\n\nCoverage: ${cov}%\n\nRun locally: npm ci && npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage`,
              assignees: ['Thamarai-IND']
            })

      - name: Create PR comment if all checks pass
        if: ${{ github.event_name == 'pull_request' && steps.coverage.outputs.coverage && steps.coverage.outputs.coverage >= '80' }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Code Review Passed - Ready for Merge. All checks passed and coverage is at or above 80%.'
            })
